version = 1
name = "connect"

[setup]
script = '''
set -euo pipefail
cd "$CODEX_WORKTREE_PATH"

python3 -m venv .venv
source .venv/bin/activate
python -m pip install --upgrade pip
pip install -e .

mkdir -p .local
if [ ! -d ".local/postgres" ] || [ ! -f ".local/postgres/PG_VERSION" ]; then
  initdb -D .local/postgres >/dev/null
fi

if ! pg_ctl -D .local/postgres status >/dev/null 2>&1; then
  pg_ctl -D .local/postgres -l .local/postgres/postgres.log -o "-p 55432" start
  sleep 2
fi

createdb -h localhost -p 55432 connect_control >/dev/null 2>&1 || true

export DATABASE_URL="${DATABASE_URL:-postgresql+psycopg://localhost:55432/connect_control}"
.venv/bin/connectctl init-db
'''

[cleanup]
script = '''
set -euo pipefail
cd "$CODEX_WORKTREE_PATH"

if [ -f ".local/postgres/PG_VERSION" ]; then
  pg_ctl -D .local/postgres stop -m fast >/dev/null 2>&1 || true
fi

rm -rf .venv .local/postgres
'''
