name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches-ignore: [ "main" ]

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Compile check
        run: python -m compileall src/control_plane
