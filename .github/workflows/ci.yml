name: CI

on:
  pull_request:
    branches: [ "main", "dev" ]
  push:
    branches: [ "dev", "main" ]
  workflow_dispatch:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install .
          sudo apt-get update
          sudo apt-get install -y ansible jq openssh-client netcat-openbsd

      - name: Local preflight
        run: make preflight

      - name: CI preflight
        run: make ci-preflight
