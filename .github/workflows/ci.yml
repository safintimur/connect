name: CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            setup.py

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Cache Terraform plugin directory
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-plugin-cache-${{ runner.os }}-${{ hashFiles('infra/terraform/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-plugin-cache-${{ runner.os }}-

      - name: Enable Terraform plugin cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> "$GITHUB_ENV"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install .
          sudo apt-get update
          sudo apt-get install -y ansible jq openssh-client netcat-openbsd

      - name: Local preflight
        run: make preflight

      - name: CI preflight
        run: make ci-preflight
