name: Control Bootstrap

on:
  workflow_dispatch:

concurrency:
  group: connect-infra-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    if: github.ref == 'refs/heads/main'
    env:
      DATABASE_URL: postgresql+psycopg://connect:connect@postgres:5432/connect_control
      BASE_SUBSCRIPTION_URL: ${{ vars.BASE_SUBSCRIPTION_URL }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'connect-core' }}
      CONTROL_NODE_NAME: ${{ vars.CONTROL_NODE_NAME || 'connect-control-1' }}
      CONTROL_NODE_REGION: ${{ vars.CONTROL_NODE_REGION || 'lon1' }}
      CONTROL_NODE_SIZE: ${{ vars.CONTROL_NODE_SIZE || 's-1vcpu-1gb' }}
      CONTROL_NODE_IMAGE: ${{ vars.CONTROL_NODE_IMAGE || 'ubuntu-24-04-x64' }}
      WORKER_NODE_NAME: ${{ vars.WORKER_NODE_NAME || 'connect-worker-uk-1' }}
      WORKER_NODE_REGION: ${{ vars.WORKER_NODE_REGION || 'lon1' }}
      WORKER_NODE_SIZE: ${{ vars.WORKER_NODE_SIZE || 's-1vcpu-1gb' }}
      WORKER_NODE_IMAGE: ${{ vars.WORKER_NODE_IMAGE || 'ubuntu-24-04-x64' }}
      AUTO_RECREATE_INFRA: ${{ vars.AUTO_RECREATE_INFRA || 'false' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'connect-space-bucket' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || 'lon1' }}
      TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX || 'connect-prod' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
      REALITY_PRIVATE_KEY: ${{ secrets.REALITY_PRIVATE_KEY }}
      REALITY_PUBLIC_KEY: ${{ secrets.REALITY_PUBLIC_KEY }}
      REALITY_SHORT_ID: ${{ secrets.REALITY_SHORT_ID }}
      REALITY_SERVER_NAME: ${{ vars.REALITY_SERVER_NAME || 'www.cloudflare.com' }}
      REALITY_DEST: ${{ vars.REALITY_DEST || 'www.cloudflare.com:443' }}
      VLESS_FLOW: xtls-rprx-vision
      VLESS_FP: chrome
      ADMIN_CIDRS_JSON: ${{ vars.ADMIN_CIDRS_JSON || '[]' }}
      TELEGRAM_ADMIN_IDS: ${{ vars.TELEGRAM_ADMIN_IDS || '' }}
      TELEGRAM_SSH_KEY_PATH: ${{ vars.TELEGRAM_SSH_KEY_PATH || '/opt/connect/.ssh/id_ed25519' }}
      INCIDENT_AGENT_BACKEND: ${{ vars.INCIDENT_AGENT_BACKEND || 'proposal-only' }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Infra common setup
        uses: ./.github/actions/infra-common-setup
        with:
          tf_state_bucket: ${{ env.TF_STATE_BUCKET }}
          tf_state_region: ${{ env.TF_STATE_REGION }}
          tf_state_key_prefix: ${{ env.TF_STATE_KEY_PREFIX }}
          do_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
          do_ssh_key_fingerprint: ${{ secrets.DO_SSH_KEY_FINGERPRINT }}
          project_name: ${{ env.PROJECT_NAME }}
          create_control: "true"
          create_worker: "false"
          control_node_name: ${{ env.CONTROL_NODE_NAME }}
          control_node_region: ${{ env.CONTROL_NODE_REGION }}
          control_node_size: ${{ env.CONTROL_NODE_SIZE }}
          control_node_image: ${{ env.CONTROL_NODE_IMAGE }}
          worker_node_name: ${{ env.WORKER_NODE_NAME }}
          worker_node_region: ${{ env.WORKER_NODE_REGION }}
          worker_node_size: ${{ env.WORKER_NODE_SIZE }}
          worker_node_image: ${{ env.WORKER_NODE_IMAGE }}
          deploy_ssh_private_key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Validate admin CIDRs
        run: |
          python scripts/validate-admin-cidrs.py

      - name: Prepare runtime .env
        run: |
          cp .env.example .env
          sed -i "s#^DATABASE_URL=.*#DATABASE_URL=${DATABASE_URL}#" .env
          sed -i "s#^BASE_SUBSCRIPTION_URL=.*#BASE_SUBSCRIPTION_URL=${BASE_SUBSCRIPTION_URL}#" .env
          sed -i "s#^REALITY_PRIVATE_KEY=.*#REALITY_PRIVATE_KEY=${REALITY_PRIVATE_KEY}#" .env
          sed -i "s#^REALITY_PUBLIC_KEY=.*#REALITY_PUBLIC_KEY=${REALITY_PUBLIC_KEY}#" .env
          sed -i "s#^REALITY_SHORT_ID=.*#REALITY_SHORT_ID=${REALITY_SHORT_ID}#" .env
          sed -i "s#^REALITY_SERVER_NAME=.*#REALITY_SERVER_NAME=${REALITY_SERVER_NAME}#" .env
          sed -i "s#^REALITY_DEST=.*#REALITY_DEST=${REALITY_DEST}#" .env
          sed -i "s#^VLESS_FLOW=.*#VLESS_FLOW=${VLESS_FLOW}#" .env
          sed -i "s#^VLESS_FP=.*#VLESS_FP=${VLESS_FP}#" .env
          sed -i "s#^TELEGRAM_ADMIN_IDS=.*#TELEGRAM_ADMIN_IDS=${TELEGRAM_ADMIN_IDS}#" .env
          sed -i "s#^TELEGRAM_SSH_KEY_PATH=.*#TELEGRAM_SSH_KEY_PATH=${TELEGRAM_SSH_KEY_PATH}#" .env
          sed -i "s#^GITHUB_REPOSITORY=.*#GITHUB_REPOSITORY=${GITHUB_REPOSITORY}#" .env
          sed -i "s#^INCIDENT_AGENT_BACKEND=.*#INCIDENT_AGENT_BACKEND=${INCIDENT_AGENT_BACKEND}#" .env
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            sed -i "s#^TELEGRAM_BOT_TOKEN=.*#TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}#" .env
          fi
          if [ -n "${{ secrets.BOT_GITHUB_TOKEN }}" ]; then
            sed -i "s#^GITHUB_TOKEN=.*#GITHUB_TOKEN=${{ secrets.BOT_GITHUB_TOKEN }}#" .env
          fi


      - name: Cleanup existing control resources (auto-recreate)
        if: env.AUTO_RECREATE_INFRA == 'true'
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
          CREATE_CONTROL: "true"
          CREATE_WORKER: "false"
        run: |
          python scripts/cleanup-do-resources.py

      - name: Check required environment
        run: make check-env

      - name: Control bootstrap process
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          TF_BACKEND_CONFIG_FILE: backend.hcl
        run: |
          make control-bootstrap

      - name: Sync worker node metadata from DigitalOcean (if exists)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
        run: |
          set -euo pipefail
          WORKER_JSON="$(curl -fsS -H "Authorization: Bearer ${DIGITALOCEAN_TOKEN}" "https://api.digitalocean.com/v2/droplets?per_page=200" \
            | jq -c --arg NAME "${WORKER_NODE_NAME}" '.droplets[]? | select(.name==$NAME) | {id, name, ip: ([.networks.v4[]? | select(.type=="public") | .ip_address][0] // ""), status} ' \
            | head -n1)"

          if [ -z "${WORKER_JSON}" ]; then
            echo "Worker ${WORKER_NODE_NAME} not found in DigitalOcean. Skip worker DB sync."
            exit 0
          fi

          WORKER_ID="$(echo "${WORKER_JSON}" | jq -r '.id | tostring')"
          WORKER_IP="$(echo "${WORKER_JSON}" | jq -r '.ip')"
          WORKER_STATUS="$(echo "${WORKER_JSON}" | jq -r '.status')"
          if [ "${WORKER_STATUS}" != "active" ] || [ -z "${WORKER_IP}" ]; then
            echo "Worker found but not active/public-ip-ready. status=${WORKER_STATUS} ip=${WORKER_IP:-none}. Skip worker DB sync."
            exit 0
          fi

          ansible control -i infra/ansible/inventory.generated.ini -m shell -a "docker compose --env-file /opt/connect/.env -f /opt/connect/control/docker-compose.yml -p connect-control exec -T control-api connectctl node-upsert ${WORKER_NODE_NAME} --role worker --country gb --provider digitalocean --provider-node-id ${WORKER_ID} --public-ip ${WORKER_IP} --actor automation"
