name: Ops Logs Fetch

on:
  workflow_dispatch:
    inputs:
      lines:
        description: "How many lines per service to fetch"
        required: false
        default: "300"
      include_worker_journal:
        description: "Fetch worker system journal and xray status"
        required: false
        default: "true"
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: connect-logs
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    environment: prod
    if: github.ref == 'refs/heads/main'
    env:
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'connect-core' }}
      CONTROL_NODE_NAME: ${{ vars.CONTROL_NODE_NAME || 'connect-control-1' }}
      CONTROL_NODE_REGION: ${{ vars.CONTROL_NODE_REGION || 'lon1' }}
      CONTROL_NODE_SIZE: ${{ vars.CONTROL_NODE_SIZE || 's-1vcpu-1gb' }}
      CONTROL_NODE_IMAGE: ${{ vars.CONTROL_NODE_IMAGE || 'ubuntu-24-04-x64' }}
      WORKER_NODE_NAME: ${{ vars.WORKER_NODE_NAME || 'connect-worker-uk-1' }}
      WORKER_NODE_REGION: ${{ vars.WORKER_NODE_REGION || 'lon1' }}
      WORKER_NODE_SIZE: ${{ vars.WORKER_NODE_SIZE || 's-1vcpu-1gb' }}
      WORKER_NODE_IMAGE: ${{ vars.WORKER_NODE_IMAGE || 'ubuntu-24-04-x64' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'connect-space-bucket' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || 'lon1' }}
      TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX || 'connect-prod' }}
      ADMIN_CIDRS_JSON: ${{ vars.ADMIN_CIDRS_JSON || '[]' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
      LOG_LINES: ${{ github.event.inputs.lines || '300' }}
      INCLUDE_WORKER_JOURNAL: ${{ github.event.inputs.include_worker_journal || 'true' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_ADMIN_IDS: ${{ vars.TELEGRAM_ADMIN_IDS || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Infra common setup
        uses: ./.github/actions/infra-common-setup
        with:
          tf_state_bucket: ${{ env.TF_STATE_BUCKET }}
          tf_state_region: ${{ env.TF_STATE_REGION }}
          tf_state_key_prefix: ${{ env.TF_STATE_KEY_PREFIX }}
          do_token: ${{ secrets.DIGITALOCEAN_TOKEN }}
          do_ssh_key_fingerprint: ${{ secrets.DO_SSH_KEY_FINGERPRINT }}
          project_name: ${{ env.PROJECT_NAME }}
          create_control: "true"
          create_worker: "true"
          control_node_name: ${{ env.CONTROL_NODE_NAME }}
          control_node_region: ${{ env.CONTROL_NODE_REGION }}
          control_node_size: ${{ env.CONTROL_NODE_SIZE }}
          control_node_image: ${{ env.CONTROL_NODE_IMAGE }}
          worker_node_name: ${{ env.WORKER_NODE_NAME }}
          worker_node_region: ${{ env.WORKER_NODE_REGION }}
          worker_node_size: ${{ env.WORKER_NODE_SIZE }}
          worker_node_image: ${{ env.WORKER_NODE_IMAGE }}
          deploy_ssh_private_key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Refresh inventory from state
        env:
          TF_BACKEND_CONFIG_FILE: backend.hcl
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          make tf-init
          make tf-apply
          make render-inventory
          make sync-nodes

      - name: Collect control logs now
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          set +e
          mkdir -p logs
          ansible control -i infra/ansible/inventory.generated.ini -m shell -a "docker compose --env-file /opt/connect/.env -f /opt/connect/control/docker-compose.yml -p connect-control logs --tail ${LOG_LINES} control-api control-bot" -o > logs/control-compose.log 2>&1 || true
          ansible control -i infra/ansible/inventory.generated.ini -m shell -a "docker ps --no-trunc" -o > logs/control-ps.log 2>&1 || true

      - name: Collect worker logs now
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          set +e
          mkdir -p logs
          ansible workers_uk -i infra/ansible/inventory.generated.ini -m shell -a "systemctl status xray --no-pager -l || true" -o > logs/worker-xray-status.log 2>&1 || true
          if [ "${INCLUDE_WORKER_JOURNAL}" = "true" ]; then
            ansible workers_uk -i infra/ansible/inventory.generated.ini -m shell -a "journalctl -u xray -n ${LOG_LINES} --no-pager || true" -o > logs/worker-xray-journal.log 2>&1 || true
          fi

      - name: Build short summary
        run: |
          mkdir -p logs
          count_matches() {
            grep -Eai "error|traceback|exception|failed" "$@" 2>/dev/null | wc -l | tr -d ' '
          }
          {
            echo "run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "control_errors=$(count_matches logs/control-compose.log)"
            echo "worker_errors=$(count_matches logs/worker-xray-journal.log logs/worker-xray-status.log)"
          } | tee logs/summary.txt

      - name: Upload log artifacts
        uses: actions/upload-artifact@v4
        with:
          name: connect-logs-${{ github.run_id }}
          path: logs/

      - name: Telegram alert on errors
        if: always() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_ADMIN_IDS != ''
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          from pathlib import Path

          def parse_admin_id(raw: str) -> str:
              raw = (raw or "").strip()
              if not raw:
                  return ""
              try:
                  if raw.startswith("["):
                      arr = json.loads(raw)
                      if arr:
                          return str(arr[0]).strip()
              except Exception:
                  pass
              if "," in raw:
                  return raw.split(",")[0].strip()
              return raw

          def parse_summary(path: Path) -> tuple[str, str]:
              if not path.exists():
                  return "n/a", "n/a"
              data: dict[str, str] = {}
              for line in path.read_text(encoding="utf-8", errors="ignore").splitlines():
                  if "=" in line:
                      k, v = line.split("=", 1)
                      data[k.strip()] = v.strip()
              return data.get("control_errors", "n/a"), data.get("worker_errors", "n/a")

          def error_excerpt(paths: list[Path], limit: int = 6) -> str:
              pattern = re.compile(r"(error|traceback|exception|failed)", re.IGNORECASE)
              rows: list[str] = []
              for path in paths:
                  if not path.exists():
                      continue
                  for raw in path.read_text(encoding="utf-8", errors="ignore").splitlines():
                      line = raw.strip()
                      if not line:
                          continue
                      if pattern.search(line):
                          rows.append(f"{path.name}: {line}")
                          if len(rows) >= limit:
                              return "\n".join(rows)
              return ""

          def fallback_excerpt(paths: list[Path], tail_lines: int = 3) -> str:
              rows: list[str] = []
              for path in paths:
                  if not path.exists():
                      continue
                  lines = [x.strip() for x in path.read_text(encoding="utf-8", errors="ignore").splitlines() if x.strip()]
                  if not lines:
                      continue
                  rows.append(f"{path.name}:")
                  rows.extend(lines[-tail_lines:])
              return "\n".join(rows)

          bot_token = os.getenv("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = parse_admin_id(os.getenv("TELEGRAM_ADMIN_IDS", ""))
          if not bot_token or not chat_id:
              raise SystemExit(0)

          event_name = os.getenv("GITHUB_EVENT_NAME", "")
          run_url = f"https://github.com/{os.getenv('GITHUB_REPOSITORY')}/actions/runs/{os.getenv('GITHUB_RUN_ID')}"
          control_err, worker_err = parse_summary(Path("logs/summary.txt"))
          has_errors = (control_err != "0" or worker_err != "0")

          if has_errors:
              title = "connect log alert"
              body = "Обнаружены ошибки, см. excerpt ниже."
          elif event_name == "schedule":
              title = "connect log ok (scheduled)"
              body = "Плановая проверка: ошибок не найдено."
          else:
              title = "connect log ok (manual)"
              body = "Ручная проверка: ошибок не найдено."

          text = [
              title,
              body,
              f"control_errors={control_err}",
              f"worker_errors={worker_err}",
              f"run={run_url}",
          ]

          if has_errors:
              excerpt = error_excerpt(
                  [
                      Path("logs/control-compose.log"),
                      Path("logs/worker-xray-status.log"),
                      Path("logs/worker-xray-journal.log"),
                  ]
              )
              if not excerpt:
                  excerpt = fallback_excerpt(
                      [
                          Path("logs/control-compose.log"),
                          Path("logs/worker-xray-status.log"),
                          Path("logs/worker-xray-journal.log"),
                      ]
                  )
              if excerpt:
                  text.append("")
                  text.append("excerpt:")
                  text.append(excerpt[:2500])

          payload = urllib.parse.urlencode(
              {
                  "chat_id": chat_id,
                  "text": "\n".join(text),
                  "disable_web_page_preview": "true",
              }
          ).encode("utf-8")
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{bot_token}/sendMessage",
              data=payload,
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
              if resp.status >= 400:
                  raise RuntimeError(f"telegram send failed with status {resp.status}")
          PY
