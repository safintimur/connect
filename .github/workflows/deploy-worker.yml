name: Worker Deploy

on:
  workflow_dispatch:

concurrency:
  group: connect-infra-prod
  cancel-in-progress: false

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    environment: prod
    if: github.ref == 'refs/heads/main'
    env:
      DATABASE_URL: postgresql+psycopg://connect:connect@postgres:5432/connect_control
      BASE_SUBSCRIPTION_URL: ${{ vars.BASE_SUBSCRIPTION_URL }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME || 'connect-core' }}
      CONTROL_NODE_NAME: ${{ vars.CONTROL_NODE_NAME || 'connect-control-1' }}
      CONTROL_NODE_REGION: ${{ vars.CONTROL_NODE_REGION || 'lon1' }}
      CONTROL_NODE_SIZE: ${{ vars.CONTROL_NODE_SIZE || 's-1vcpu-1gb' }}
      CONTROL_NODE_IMAGE: ${{ vars.CONTROL_NODE_IMAGE || 'ubuntu-24-04-x64' }}
      WORKER_NODE_NAME: ${{ vars.WORKER_NODE_NAME || 'connect-worker-uk-1' }}
      WORKER_NODE_REGION: ${{ vars.WORKER_NODE_REGION || 'lon1' }}
      WORKER_NODE_SIZE: ${{ vars.WORKER_NODE_SIZE || 's-1vcpu-1gb' }}
      WORKER_NODE_IMAGE: ${{ vars.WORKER_NODE_IMAGE || 'ubuntu-24-04-x64' }}
      AUTO_RECREATE_INFRA: ${{ vars.AUTO_RECREATE_INFRA || 'false' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'connect-space-bucket' }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION || 'lon1' }}
      TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX || 'connect-prod' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
      REALITY_PRIVATE_KEY: ${{ secrets.REALITY_PRIVATE_KEY }}
      REALITY_PUBLIC_KEY: ${{ secrets.REALITY_PUBLIC_KEY }}
      REALITY_SHORT_ID: ${{ secrets.REALITY_SHORT_ID }}
      REALITY_SERVER_NAME: ${{ vars.REALITY_SERVER_NAME || 'www.cloudflare.com' }}
      REALITY_DEST: ${{ vars.REALITY_DEST || 'www.cloudflare.com:443' }}
      VLESS_FLOW: xtls-rprx-vision
      VLESS_FP: chrome
      ADMIN_CIDRS_JSON: ${{ vars.ADMIN_CIDRS_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install runtime tools
        run: |
          python -m pip install --upgrade pip
          pip install .
          sudo apt-get update
          sudo apt-get install -y ansible jq openssh-client

      - name: Validate admin CIDRs
        run: |
          python scripts/validate-admin-cidrs.py

      - name: Configure Terraform backend (DO Spaces)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_ACCESS_KEY }}
        run: |
          cat > infra/terraform/backend.hcl <<EOF_BACKEND
          bucket = "${TF_STATE_BUCKET}"
          key = "${TF_STATE_KEY_PREFIX}/infra/terraform.tfstate"
          region = "${TF_STATE_REGION}"
          endpoints = { s3 = "https://${TF_STATE_REGION}.digitaloceanspaces.com" }
          skip_region_validation = true
          skip_credentials_validation = true
          skip_requesting_account_id = true
          use_path_style = false
          use_lockfile = true
          EOF_BACKEND

      - name: Prepare runtime .env
        run: |
          cp .env.example .env
          sed -i "s#^DATABASE_URL=.*#DATABASE_URL=${DATABASE_URL}#" .env
          sed -i "s#^BASE_SUBSCRIPTION_URL=.*#BASE_SUBSCRIPTION_URL=${BASE_SUBSCRIPTION_URL}#" .env
          sed -i "s#^REALITY_PRIVATE_KEY=.*#REALITY_PRIVATE_KEY=${REALITY_PRIVATE_KEY}#" .env
          sed -i "s#^REALITY_PUBLIC_KEY=.*#REALITY_PUBLIC_KEY=${REALITY_PUBLIC_KEY}#" .env
          sed -i "s#^REALITY_SHORT_ID=.*#REALITY_SHORT_ID=${REALITY_SHORT_ID}#" .env
          sed -i "s#^REALITY_SERVER_NAME=.*#REALITY_SERVER_NAME=${REALITY_SERVER_NAME}#" .env
          sed -i "s#^REALITY_DEST=.*#REALITY_DEST=${REALITY_DEST}#" .env
          sed -i "s#^VLESS_FLOW=.*#VLESS_FLOW=${VLESS_FLOW}#" .env
          sed -i "s#^VLESS_FP=.*#VLESS_FP=${VLESS_FP}#" .env

      - name: Prepare SSH key for Ansible
        run: |
          mkdir -p ~/.ssh
          RAW_KEY='${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}'
          if [[ "$RAW_KEY" == *"\\n"* ]]; then
            printf '%b' "$RAW_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          else
            printf '%s\n' "$RAW_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null

      - name: Build effective admin CIDRs (runner only)
        run: |
          export RUNNER_IP="$(curl -4 -fsSL https://api.ipify.org)"
          echo "Runner public IP: ${RUNNER_IP}"
          python - <<'PY'
          import ipaddress
          import json
          import os

          runner_ip = os.environ["RUNNER_IP"]
          effective = [f"{runner_ip}/32"]
          ipaddress.ip_network(effective[0], strict=False)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"ADMIN_CIDRS_EFFECTIVE_JSON={json.dumps(effective)}\n")
          PY

      - name: Build terraform.tfvars from secrets
        run: |
          cat > infra/terraform/terraform.tfvars <<EOFVARS
          do_token = "${{ secrets.DIGITALOCEAN_TOKEN }}"
          project_name = "${PROJECT_NAME}"
          create_control = true
          create_worker = true
          ssh_key_fingerprints = ["${{ secrets.DO_SSH_KEY_FINGERPRINT }}"]
          control_node_name = "${CONTROL_NODE_NAME}"
          control_node_region = "${CONTROL_NODE_REGION}"
          control_node_size = "${CONTROL_NODE_SIZE}"
          control_node_image = "${CONTROL_NODE_IMAGE}"
          worker_node_name = "${WORKER_NODE_NAME}"
          worker_node_region = "${WORKER_NODE_REGION}"
          worker_node_size = "${WORKER_NODE_SIZE}"
          worker_node_image = "${WORKER_NODE_IMAGE}"
          allowed_admin_cidrs = ${ADMIN_CIDRS_EFFECTIVE_JSON}
          EOFVARS

      - name: Cleanup existing control+worker resources (auto-recreate)
        if: env.AUTO_RECREATE_INFRA == 'true'
        env:
          DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
          CREATE_CONTROL: "false"
          CREATE_WORKER: "true"
        run: |
          python scripts/cleanup-do-resources.py

      - name: Check required environment
        run: make check-env

      - name: Refresh inventory and node metadata
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          TF_BACKEND_CONFIG_FILE: backend.hcl
        run: |
          make tf-init
          make tf-apply
          make render-inventory
          make ansible-bootstrap
          make deploy-control
          make sync-nodes

      - name: Wait for worker SSH readiness
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible workers_uk -i infra/ansible/inventory.generated.ini -m wait_for_connection -a "timeout=300"

      - name: Deploy worker runtime
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          make worker-deploy
